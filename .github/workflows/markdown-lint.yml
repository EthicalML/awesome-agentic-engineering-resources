name: markdown-lint

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '.markdownlint.jsonc'
      - '.github/workflows/markdown-lint.yml'
  pull_request:
    paths:
      - '**/*.md'
      - '.markdownlint.jsonc'
      - '.github/workflows/markdown-lint.yml'

permissions:
  contents: read

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: '**/*.md'
