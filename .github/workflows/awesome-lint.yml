name: awesome-lint

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - '.github/workflows/awesome-lint.yml'
  pull_request:
    paths:
      - 'README.md'
      - '.github/workflows/awesome-lint.yml'

permissions:
  contents: read

jobs:
  awesome-lint:
    name: awesome-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run awesome-lint
        run: |
          set +e
          output=$(npx awesome-lint@2.3.0 2>&1)
          exit_code=$?
          printf '%s\n' "$output"
          if [ "$exit_code" -ne 0 ]; then
            # The remark-lint:awesome-github rule checks GitHub repository metadata
            # (description and topics). Those require repository settings to be updated,
            # not code changes, so we skip that specific check here.
            # All other lint errors still fail the build.
            non_github=$(printf '%s\n' "$output" | grep 'remark-lint:' | grep -v 'remark-lint:awesome-github')
            if [ -n "$non_github" ] || ! printf '%s\n' "$output" | grep -q 'remark-lint:'; then
              exit 1
            fi
          fi
