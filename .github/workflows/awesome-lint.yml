name: awesome-lint

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - '.github/workflows/awesome-lint.yml'
  pull_request:
    paths:
      - 'README.md'
      - '.github/workflows/awesome-lint.yml'

permissions:
  contents: read

jobs:
  awesome-lint:
    name: awesome-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run awesome-lint
        run: npx awesome-lint
